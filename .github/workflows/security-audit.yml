name: Security Audit (npm)

# 固定掃描依賴 CVE：每週一排程 + 每個 PR + 手動觸發；high/critical 即失敗
on:
  schedule:
    - cron: "0 1 * * 1" # 每週一 09:00 Asia/Taipei
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit report (informational)
        run: npm audit || true
      - name: Fail on high / critical
        run: npm audit --audit-level=high
